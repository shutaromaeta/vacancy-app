<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>空室一覧</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
  background: #f5f5f5;
}

/* 施設ブロック */
.facility-block {
  margin-bottom: 20px;
}

.facility-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 8px;
  padding: 6px 8px;
  background: #333;
  color: #fff;
  border-radius: 6px;
}

/* カード */
.card {
  border: 1px solid #ddd;
  padding: 12px;
  margin-bottom: 8px;
  border-radius: 10px;
  background: #fff;
}

/* ステータス色分け */
.status-empty {
  color: green;
  font-weight: bold;
}

.status-leave {
  color: orange;
  font-weight: bold;
}

.room {
  font-size: 15px;
  margin-bottom: 4px;
}

.ok {
  font-size: 13px;
  color: #333;
}

.ng {
  font-size: 13px;
  color: red;
}
</style>
</head>

<body>

<h2>現在ご案内可能なお部屋</h2>
<div id="list"></div>

<script>
fetch("https://script.google.com/macros/s/AKfycbysLu-UEDWHN-p3lKtfjsHEimUX_YFa1alRjUomjqGcSaO9L33VFUK2CZHCXjcwSse2/exec")
.then(res => res.json())
.then(data => {

  const rows = data.slice(1);
  const list = document.getElementById("list");

  const seen = new Set();
  const grouped = {};

  // データ整理
  rows.forEach(row => {
    const facility = row[0];
    const room = row[1];
    const status = (row[2] || "").trim();

    const key = facility + "_" + room;

    if(status.includes("空室") || status.includes("退居")){

      if(seen.has(key)) return;
      seen.add(key);

      if(!grouped[facility]) grouped[facility] = [];

      grouped[facility].push({
        room,
        status,
        ok: row[3],
        ng: row[4]
      });
    }
  });

  // 施設ごとに表示（並び替え）
  Object.keys(grouped).sort().forEach(facility => {

    let html = `<div class="facility-block">`;
    html += `<div class="facility-title">${facility}</div>`;

    grouped[facility].forEach(item => {

      const statusClass = item.status.includes("空室") ? "status-empty" : "status-leave";

      html += `
        <div class="card">
          <div class="room">${item.room}号室 
            <span class="${statusClass}">（${item.status}）</span>
          </div>
          ${item.ok ? `<div class="ok">受入可：${item.ok}</div>` : ""}
          ${item.ng ? `<div class="ng">NG：${item.ng}</div>` : ""}
        </div>
      `;
    });

    html += `</div>`;

    list.innerHTML += html;
  });

});
</script>

</body>
</html>
