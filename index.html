<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vT_YFkoH2zN5DAqpztrEkU6OBfKksY5M2GV6RKTuSsS-KeqUzhyW1XnFIMcTdVqQO9YnlE0pz4s9BxU/pub?output=csv")
.then(res => res.text())
.then(data => {
  const rows = data.split(/\r?\n/).slice(1);
  const list = document.getElementById("list");

  rows.forEach(row => {
    if(!row) return;

    const cols = row.split(",");

    // ★ 条件を外す（全部表示）
    list.innerHTML += `
      <div class="card">
        <div class="title">${cols[1]}号室</div>
        ${cols[0]}<br>
        ステータス：${cols[2]}<br>
        ${cols[3]}<br>
        ${cols[4]}
      </div>
    `;
  });
});
</script>
