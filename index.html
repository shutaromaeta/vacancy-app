<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>空室一覧</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f5f5f5;
}

.header {
  background: #0d47a1;
  color: #fff;
  padding: 12px;
}

.header-inner {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-title {
  font-size: 16px;
  font-weight: bold;
}

.header-sub {
  font-size: 12px;
  opacity: 0.9;
}

.facility-block {
  margin: 14px;
}

.facility-title {
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 6px;
  padding: 6px 8px;
  background: #eeeeee;
  border-radius: 6px;
}

.card {
  background: #fff;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 8px;
  border: 1px solid #ddd;
}

.room {
  font-size: 14px;
  margin-bottom: 4px;
}

.status-empty {
  color: green;
  font-weight: bold;
}

.status-leave {
  color: orange;
  font-weight: bold;
}

.ok { font-size: 12px; }
.ng { font-size: 12px; color: red; }

.card-btn {
  display: block;
  margin-top: 8px;
  background: #06c755;
  color: #fff;
  padding: 8px;
  border-radius: 6px;
  text-align: center;
  text-decoration: none;
  font-size: 13px;
}

.consult-btn {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: #06c755;
  color: #fff;
  padding: 14px 20px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="header">
  <div class="header-inner">
    <img src="https://raw.githubusercontent.com/shutaromaeta/vacancy-app/main/logomark%20(1).png" style="height:26px;">
    <div>
      <div class="header-title">紅萌会グループ 空室情報</div>
      <div class="header-sub">現在ご案内可能なお部屋</div>
    </div>
  </div>
</div>

<div id="list"></div>

<!-- 固定ボタン -->
<a href="https://line.me/R/oaMessage/@419summx/?%E7%B4%85%E8%90%8C%E4%BC%9A%E3%82%B0%E3%83%AB%E3%83%BC%E3%83%97%E3%81%AE%E7%A9%BA%E5%AE%A4%E3%81%AB%E3%81%A4%E3%81%84%E3%81%A6%E7%9B%B8%E8%AB%87%E3%81%97%E3%81%9F%E3%81%84%E3%81%A7%E3%81%99" class="consult-btn">
  入居相談する（LINE）
</a>

<script>
fetch("https://script.google.com/macros/s/AKfycbysLu-UEDWHN-p3lKtfjsHEimUX_YFa1alRjUomjqGcSaO9L33VFUK2CZHCXjcwSse2/exec")
.then(res => res.json())
.then(data => {

  const rows = data.slice(1);
  const list = document.getElementById("list");

  const seen = new Set();
  const grouped = {};

  rows.forEach(row => {
    const facility = row[0];
    const room = row[1];
    const status = (row[2] || "").trim();

    const key = facility + "_" + room;

    if(status.includes("空室") || status.includes("退居")){

      if(seen.has(key)) return;
      seen.add(key);

      if(!grouped[facility]) grouped[facility] = [];

      grouped[facility].push({
        facility,
        room,
        status,
        ok: row[3],
        ng: row[4]
      });
    }
  });

  Object.keys(grouped).sort().forEach(facility => {

    let html = `<div class="facility-block">`;
    html += `<div class="facility-title">${facility}</div>`;

    grouped[facility].forEach(item => {

      const statusClass = item.status.includes("空室") ? "status-empty" : "status-leave";

      html += `
        <div class="card">
          <div class="room">
            ${item.room}号室
            <span class="${statusClass}">（${item.status}）</span>
          </div>
          ${item.ok ? `<div class="ok">受入可：${item.ok}</div>` : ""}
          ${item.ng ? `<div class="ng">NG：${item.ng}</div>` : ""}

          <a href="https://line.me/R/oaMessage/@419summx/?${encodeURIComponent(item.facility + 'の' + item.room + '号室について相談したいです')}" class="card-btn">
            この部屋を相談する
          </a>
        </div>
      `;
    });

    html += `</div>`;
    list.innerHTML += html;
  });

});
</script>

</body>
</html>
