<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>空室一覧</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f5f5f5;
}

/* ヘッダー */
.header {
  background: #0d47a1;
  color: #fff;
  padding: 14px;
}

.header-title {
  font-size: 16px;
  font-weight: bold;
}

.header-sub {
  font-size: 13px;
  opacity: 0.9;
}

/* 施設 */
.facility-block {
  margin: 14px;
}

.facility-title {
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 6px;
  padding: 6px 8px;
  background: #eeeeee;
  border-radius: 6px;
}

/* カード */
.card {
  background: #fff;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 8px;
  border: 1px solid #ddd;
}

.room {
  font-size: 14px;
  margin-bottom: 4px;
}

.status-empty {
  color: green;
  font-weight: bold;
}

.status-leave {
  color: orange;
  font-weight: bold;
}

.ok { font-size: 12px; }
.ng { font-size: 12px; color: red; }
</style>
</head>

<body>

<div class="header">
  <div class="header-title">紅萌会グループ 空室情報</div>
  <div class="header-sub">現在ご案内可能なお部屋</div>
</div>

<div id="list"></div>

<script>
fetch("https://script.google.com/macros/s/AKfycbysLu-UEDWHN-p3lKtfjsHEimUX_YFa1alRjUomjqGcSaO9L33VFUK2CZHCXjcwSse2/exec")
.then(res => res.json())
.then(data => {

  const rows = data.slice(1);
  const list = document.getElementById("list");

  const seen = new Set();
  const grouped = {};

  rows.forEach(row => {
    const facility = row[0];
    const room = row[1];
    const status = (row[2] || "").trim();

    const key = facility + "_" + room;

    if(status.includes("空室") || status.includes("退居")){

      if(seen.has(key)) return;
      seen.add(key);

      if(!grouped[facility]) grouped[facility] = [];

      grouped[facility].push({
        room,
        status,
        ok: row[3],
        ng: row[4]
      });
    }
  });

  Object.keys(grouped).sort().forEach(facility => {

    let html = `<div class="facility-block">`;
    html += `<div class="facility-title">${facility}</div>`;

    grouped[facility].forEach(item => {

      const statusClass = item.status.includes("空室") ? "status-empty" : "status-leave";

      html += `
        <div class="card">
          <div class="room">
            ${item.room}号室
            <span class="${statusClass}">（${item.status}）</span>
          </div>
          ${item.ok ? `<div class="ok">受入可：${item.ok}</div>` : ""}
          ${item.ng ? `<div class="ng">NG：${item.ng}</div>` : ""}
        </div>
      `;
    });

    html += `</div>`;
    list.innerHTML += html;
  });

});
</script>

</body>
</html>
